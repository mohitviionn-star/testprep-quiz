<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 230" width="320" height="230" font-family="system-ui, sans-serif">
  <!-- axes -->
  <line x1="45" y1="20" x2="45" y2="185" stroke="#0f172a" stroke-width="2"/>
  <line x1="45" y1="185" x2="305" y2="185" stroke="#0f172a" stroke-width="2"/>
  <!-- y gridlines + labels (0,10,20,30,40,50) -->
  <g font-size="11" fill="#64748b">
    <line x1="45" y1="185" x2="305" y2="185" stroke="#e2e8f0"/>
    <line x1="45" y1="152" x2="305" y2="152" stroke="#e2e8f0"/><text x="40" y="156" text-anchor="end">10</text>
    <line x1="45" y1="119" x2="305" y2="119" stroke="#e2e8f0"/><text x="40" y="123" text-anchor="end">20</text>
    <line x1="45" y1="86"  x2="305" y2="86"  stroke="#e2e8f0"/><text x="40" y="90"  text-anchor="end">30</text>
    <line x1="45" y1="53"  x2="305" y2="53"  stroke="#e2e8f0"/><text x="40" y="57"  text-anchor="end">40</text>
    <line x1="45" y1="20"  x2="305" y2="20"  stroke="#e2e8f0"/><text x="40" y="24"  text-anchor="end">50</text>
    <text x="40" y="189" text-anchor="end">0</text>
  </g>
  <!-- bars: Q1=20 Q2=35 Q3=30 Q4=45 ; y = 185 - value*3.3 -->
  <g fill="#3563ff">
    <rect x="65"  y="119" width="40" height="66"  rx="3"/>
    <rect x="125" y="69.5" width="40" height="115.5" rx="3"/>
    <rect x="185" y="86"  width="40" height="99"  rx="3"/>
    <rect x="245" y="36.5" width="40" height="148.5" rx="3"/>
  </g>
  <!-- value labels -->
  <g font-size="12" font-weight="bold" fill="#0f172a" text-anchor="middle">
    <text x="85"  y="113">20</text>
    <text x="145" y="63">35</text>
    <text x="205" y="80">30</text>
    <text x="265" y="30">45</text>
  </g>
  <!-- x labels -->
  <g font-size="12" fill="#0f172a" text-anchor="middle">
    <text x="85"  y="202">Q1</text>
    <text x="145" y="202">Q2</text>
    <text x="205" y="202">Q3</text>
    <text x="265" y="202">Q4</text>
  </g>
  <text x="175" y="222" text-anchor="middle" font-size="11" fill="#64748b">Quarterly sales ($000s)</text>
</svg>
